# ============================================
# PromptGuard — application.properties
# ============================================
# ONLY thing you need to do manually:
#   1. Create a PostgreSQL database named: prompt_guard
#      (In DBeaver: right-click Databases → Create New Database → name: prompt_guard)
#   2. Change the password below to match your PostgreSQL password
#   3. Run: mvn spring-boot:run
#
# Spring Boot will automatically create all tables and seed data on first run.
# ============================================

# --- Database ---
spring.datasource.url=jdbc:postgresql://localhost:5432/browser_extension_final
spring.datasource.username=postgres
spring.datasource.password=Rohan@webkorps

# --- Auto-create tables on startup (schema.sql in resources runs automatically) ---
spring.sql.init.mode=always
spring.sql.init.platform=postgresql

# --- NO JPA — JdbcTemplate only ---
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# --- Server ---
server.port=8080

# --- Logging ---
logging.level.com.promptguard=INFO
logging.level.org.springframework.web=WARN
